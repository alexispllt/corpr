<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - Corpr</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="images/AppIconRound.png">
  <style>
    .reset-container {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 24px;
      background: var(--bg-main);
    }
    .reset-card {
      background: var(--bg-elevated);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 24px;
      padding: 40px;
      width: 100%;
      max-width: 480px;
      text-align: center;
    }
    .reset-logo {
      width: 64px;
      height: 64px;
      border-radius: 16px;
      margin-bottom: 24px;
    }
    .reset-title {
      font-size: 28px;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 12px;
    }
    .reset-desc {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 32px;
    }
    .reset-form {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .reset-input {
      width: 100%;
      padding: 16px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: var(--bg-main);
      color: var(--text-primary);
      font-size: 16px;
      outline: none;
      transition: border-color 0.3s ease;
    }
    .reset-input:focus {
      border-color: var(--primary);
    }
    .reset-btn {
      width: 100%;
      padding: 16px;
      border-radius: 12px;
      background: var(--primary);
      color: white;
      font-size: 16px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      margin-top: 16px;
      transition: background 0.3s ease;
    }
    .reset-btn:hover {
      background: var(--primary-hover);
    }
    .reset-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .message {
      margin-top: 16px;
      font-size: 14px;
      display: none;
    }
    .message.error {
      color: var(--bear-red);
      display: block;
    }
    .message.success {
      color: var(--bull-green);
      display: block;
    }
  </style>
</head>
<body>

  <div class="reset-container">
    <div class="reset-card">
      <img src="images/AppIconRound.png" alt="Corpr Logo" class="reset-logo" onerror="this.style.display='none'">
      <h1 class="reset-title">Reset Password</h1>
      <p class="reset-desc" id="statusDesc">Please wait...</p>
      
      <form id="resetForm" class="reset-form" style="display: none;">
        <input type="password" id="newPassword" class="reset-input" placeholder="New Password" required minlength="6">
        <input type="password" id="confirmPassword" class="reset-input" placeholder="Confirm New Password" required minlength="6">
        <button type="submit" id="submitBtn" class="reset-btn">Update Password</button>
      </form>

      <div id="message" class="message"></div>
      
      <div id="successBlock" style="display: none; margin-top: 32px;">
        <a href="corpr://" class="btn-secondary" style="display: inline-block;">Return to App</a>
      </div>
    </div>
  </div>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

  <script>
    // Configuration Firebase Web App
    const firebaseConfig = {
      apiKey: "AIzaSyCHiG5PMAatgcARwMEJkRoO1_1Rmav4P0k",
      authDomain: "corpr-ec92e.firebaseapp.com",
      projectId: "corpr-ec92e",
      storageBucket: "corpr-ec92e.firebasestorage.app",
      messagingSenderId: "563905451198",
      appId: "1:563905451198:web:2fa0259a703061ca923aef",
      measurementId: "G-385BPNB34G"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    const urlParams = new URLSearchParams(window.location.search);
    const actionCode = urlParams.get('oobCode');
    const mode = urlParams.get('mode');

    const form = document.getElementById('resetForm');
    const newPasswordInput = document.getElementById('newPassword');
    const confirmPasswordInput = document.getElementById('confirmPassword');
    const submitBtn = document.getElementById('submitBtn');
    const messageEl = document.getElementById('message');
    const descEl = document.getElementById('statusDesc');
    const successBlock = document.getElementById('successBlock');

    if (!actionCode || mode !== 'resetPassword') {
      descEl.textContent = 'Invalid or expired password reset link.';
      messageEl.className = 'message error';
      messageEl.textContent = 'Please request a new password reset link from the Corpr app.';
    } else {
      // Link is present, let's verify it
      auth.verifyPasswordResetCode(actionCode).then((email) => {
        descEl.textContent = `Create a new password for: ${email}`;
        form.style.display = 'flex';
      }).catch((error) => {
        descEl.textContent = 'Invalid or expired password reset link.';
        messageEl.className = 'message error';
        messageEl.textContent = error.message;
      });
    }

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      
      const newPassword = newPasswordInput.value;
      const confirmPassword = confirmPasswordInput.value;

      if (newPassword !== confirmPassword) {
        messageEl.className = 'message error';
        messageEl.textContent = 'Passwords do not match.';
        return;
      }

      if (newPassword.length < 6) {
        messageEl.className = 'message error';
        messageEl.textContent = 'Password must be at least 6 characters long.';
        return;
      }

      submitBtn.disabled = true;
      submitBtn.textContent = 'Updating...';
      messageEl.style.display = 'none';

      auth.confirmPasswordReset(actionCode, newPassword).then(() => {
        form.style.display = 'none';
        descEl.textContent = 'Password updated successfully!';
        messageEl.className = 'message success';
        messageEl.textContent = 'You can now log in to Corpr with your new password.';
        successBlock.style.display = 'block';
      }).catch((error) => {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Update Password';
        messageEl.className = 'message error';
        messageEl.textContent = error.message;
      });
    });
  </script>
</body>
</html>
