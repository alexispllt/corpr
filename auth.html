<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Authentication - Corpr</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="images/AppIconRound.png">
  <style>
    .auth-container {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 40px 20px;
      background: var(--bg-main);
      position: relative;
      overflow: hidden;
    }
    
    .auth-glow {
      position: absolute;
      top: -20%;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(52, 152, 219, 0.15) 0%, rgba(26, 32, 44, 0) 70%);
      z-index: 0;
      pointer-events: none;
    }

    .auth-card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 440px;
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
    }

    .auth-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .auth-header h2 {
      font-size: 28px;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .auth-header p {
      font-size: 14px;
      color: var(--text-secondary);
    }

    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-group label {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
    }

    .form-group input {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border-light);
      border-radius: 12px;
      padding: 14px;
      color: var(--text-primary);
      font-size: 15px;
      transition: all 0.2s ease;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--accent-blue);
      background: rgba(255, 255, 255, 0.08);
    }

    .auth-btn {
      background: var(--accent-blue);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 16px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-top: 8px;
    }

    .auth-btn:hover {
      background: #2980b9;
      transform: translateY(-2px);
    }
    
    .auth-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .sso-buttons {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 24px;
    }

    .sso-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: transparent;
      border: 1px solid var(--border-light);
      color: var(--text-primary);
      border-radius: 12px;
      padding: 14px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .sso-btn:hover {
      background: rgba(255, 255, 255, 0.05);
    }

    .sso-btn svg {
      width: 20px;
      height: 20px;
    }

    .auth-divider {
      display: flex;
      align-items: center;
      text-align: center;
      margin: 24px 0;
      color: var(--text-muted);
      font-size: 13px;
    }

    .auth-divider::before,
    .auth-divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid var(--border-light);
    }

    .auth-divider:not(:empty)::before {
      margin-right: .25em;
    }

    .auth-divider:not(:empty)::after {
      margin-left: .25em;
    }

    .auth-toggle {
      text-align: center;
      margin-top: 24px;
      font-size: 14px;
      color: var(--text-secondary);
    }

    .auth-toggle a {
      color: var(--accent-blue);
      text-decoration: none;
      font-weight: 500;
    }

    .auth-toggle a:hover {
      text-decoration: underline;
    }
    
    #error-message {
      color: var(--bear-red);
      font-size: 14px;
      text-align: center;
      margin-bottom: 16px;
      display: none;
    }
  </style>
</head>
<body>

  <!-- ======== NAV ======== -->
  <nav class="nav">
    <a href="index.html" class="nav-logo">Corpr<span>.</span></a>
  </nav>

  <div class="auth-container">
    <div class="auth-glow"></div>
    
    <div class="auth-card" id="login-card">
      <div class="auth-header">
        <h2>Welcome Back</h2>
        <p>Log in to access your Corpr account</p>
      </div>
      
      <p id="login-error" style="color: #E74C3C; font-size: 13px; text-align: center; margin-bottom: 16px; display: none;"></p>

      <form class="auth-form" id="login-form">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="login-email" required placeholder="name@example.com">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="login-password" required placeholder="••••••••">
        </div>
        <div style="text-align: right;">
          <a href="#" id="forgot-password-link" style="color: var(--text-muted); font-size: 12px; text-decoration: none;">Forgot password?</a>
        </div>
        <button type="submit" class="auth-btn" id="login-btn">Log In</button>
      </form>

      <div class="auth-divider">or continue with</div>

      <div class="sso-buttons">
        <button class="sso-btn" id="login-google">
          <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
          Google
        </button>
        <button class="sso-btn" id="login-apple">
          <svg viewBox="0 0 384 512" fill="currentColor"><path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-82.5 102.6-119.3-65.2-30.7-61.7-90-61.7-91.9zm-56.6-164.2c27.3-32.4 24.8-61.9 24-72.5-24.1 1.4-52 16.4-67.9 34.9-17.5 19.8-27.8 44.3-25.6 71.9 26.1 2 49.9-11.4 69.5-34.3z"/></svg>
          Apple
        </button>
      </div>

      <div class="auth-toggle">
        Don't have an account? <a href="#" id="show-signup">Sign Up</a>
      </div>
    </div>

    <div class="auth-card" id="signup-card" style="display: none;">
      <div class="auth-header">
        <h2>Create Account</h2>
        <p>Join Corpr and master finance</p>
      </div>
      
      <p id="signup-error" style="color: #E74C3C; font-size: 13px; text-align: center; margin-bottom: 16px; display: none;"></p>

      <form class="auth-form" id="signup-form">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="signup-name" required placeholder="John Doe">
        </div>
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="signup-username" required placeholder="@johndoe">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="signup-email" required placeholder="name@example.com">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="signup-password" required placeholder="••••••••" minlength="6">
        </div>
        <button type="submit" class="auth-btn" id="signup-btn">Sign Up</button>
      </form>

      <div class="auth-divider">or continue with</div>

      <div class="sso-buttons">
        <button class="sso-btn" id="signup-google">
          <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
          Google
        </button>
        <button class="sso-btn" id="signup-apple">
          <svg viewBox="0 0 384 512" fill="currentColor"><path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-82.5 102.6-119.3-65.2-30.7-61.7-90-61.7-91.9zm-56.6-164.2c27.3-32.4 24.8-61.9 24-72.5-24.1 1.4-52 16.4-67.9 34.9-17.5 19.8-27.8 44.3-25.6 71.9 26.1 2 49.9-11.4 69.5-34.3z"/></svg>
          Apple
        </button>
      </div>

      <div class="auth-toggle">
        Already have an account? <a href="#" id="show-login">Log In</a>
      </div>
    </div>

    <div class="auth-card" id="reset-card" style="display: none;">
      <div class="auth-header">
        <h2>Reset Password</h2>
        <p>Enter your email to receive a reset link</p>
      </div>
      
      <p id="reset-msg" style="font-size: 13px; text-align: center; margin-bottom: 16px; display: none;"></p>

      <form class="auth-form" id="reset-form">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="reset-email" required placeholder="name@example.com">
        </div>
        <button type="submit" class="auth-btn" id="reset-btn">Send Reset Link</button>
      </form>

      <div class="auth-toggle" style="margin-top: 32px;">
        <a href="#" id="back-to-login">Back to Login</a>
      </div>
    </div>
  </div>

  <script type="module" src="firebase-config.js"></script>
  <script type="module" src="auth.js"></script>
</body>
</html>
