<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile - Corpr</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="images/AppIconRound.png">
  <style>
    .profile-container {
      max-width: 800px;
      margin: 120px auto 60px;
      padding: 0 24px;
    }

    .profile-card {
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      border-radius: 24px;
      padding: 40px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
    }

    .profile-header {
      display: flex;
      align-items: center;
      gap: 32px;
      margin-bottom: 40px;
      padding-bottom: 40px;
      border-bottom: 1px solid var(--border-light);
    }

    .avatar-wrapper {
      position: relative;
      width: 120px;
      height: 120px;
    }

    .avatar-img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      background: var(--bg-secondary);
      border: 2px solid var(--accent-blue);
    }

    .avatar-upload-btn {
      position: absolute;
      bottom: 0;
      right: 0;
      background: var(--accent-blue);
      color: white;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border: 3px solid var(--bg-card);
      transition: all 0.2s ease;
    }

    .avatar-upload-btn:hover {
      background: #2980b9;
      transform: scale(1.05);
    }

    .avatar-upload-btn svg {
      width: 16px;
      height: 16px;
    }

    .profile-info h1 {
      font-size: 32px;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .profile-info p {
      font-size: 16px;
      color: var(--text-secondary);
    }

    .profile-form {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      margin-bottom: 40px;
    }

    @media (max-width: 768px) {
      .profile-form {
        grid-template-columns: 1fr;
      }
      .profile-header {
        flex-direction: column;
        text-align: center;
      }
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .form-group label {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-secondary);
    }

    .form-group input {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border-light);
      border-radius: 12px;
      padding: 14px;
      color: var(--text-primary);
      font-size: 15px;
      transition: all 0.2s ease;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--accent-blue);
      background: rgba(255, 255, 255, 0.08);
    }
    
    .form-group input:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .save-btn {
      background: var(--accent-blue);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 14px 32px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .save-btn:hover {
      background: #2980b9;
    }
    
    .save-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .logout-btn {
      background: transparent;
      color: var(--bear-red);
      border: 1px solid var(--bear-red);
      border-radius: 12px;
      padding: 14px 32px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .logout-btn:hover {
      background: rgba(231, 76, 60, 0.1);
    }

    .app-cta-banner {
      background: linear-gradient(135deg, rgba(52, 152, 219, 0.1), rgba(155, 89, 182, 0.1));
      border: 1px solid var(--border-light);
      border-radius: 16px;
      padding: 32px;
      text-align: center;
      margin-top: 40px;
    }

    .app-cta-banner h3 {
      font-size: 20px;
      color: var(--text-primary);
      margin-bottom: 12px;
    }

    .app-cta-banner p {
      font-size: 15px;
      color: var(--text-secondary);
      margin-bottom: 24px;
      max-width: 500px;
      margin-left: auto;
      margin-right: auto;
    }
    
    #status-msg {
      margin-top: 16px;
      font-size: 14px;
      font-weight: 500;
      display: none;
    }
  </style>
</head>
<body>

  <!-- ======== NAV ======== -->
  <nav class="nav">
    <a href="index.html" class="nav-logo">Corpr<span>.</span></a>
  </nav>

  <div class="profile-container">
    <div class="profile-card">
      <div class="profile-header">
        <div class="avatar-wrapper">
          <img src="images/AppIconRound.png" alt="Profile" class="avatar-img" id="avatar-img">
          <label for="avatar-upload" class="avatar-upload-btn">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M4 19h16v2H4v-2zm12-9l-1.41-1.41L13 10.17V3h-2v7.17L9.41 8.59 8 10l4 4 4-4z"/></svg>
          </label>
          <input type="file" id="avatar-upload" accept="image/png, image/jpeg" style="display: none;">
        </div>
        <div class="profile-info">
          <h1 id="display-name">Loading...</h1>
          <p id="display-username">@username</p>
          <p id="display-tier" style="margin-top: 8px; display: inline-block; padding: 4px 12px; background: rgba(52, 152, 219, 0.2); color: var(--accent-blue); border-radius: 20px; font-size: 13px; font-weight: 600;">Free Tier</p>
        </div>
      </div>

      <form id="profile-form">
        <div class="profile-form">
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="input-name" required>
          </div>
          <div class="form-group">
            <label>Username</label>
            <input type="text" id="input-username" required>
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" id="input-email" disabled>
          </div>
          <div class="form-group">
            <label>Joined</label>
            <input type="text" id="input-joined" disabled>
          </div>
        </div>

        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px;">
          <button type="submit" class="save-btn" id="save-btn">Save Changes</button>
          <button type="button" class="logout-btn" id="logout-btn">Log Out</button>
        </div>
        <div id="status-msg"></div>
      </form>
    </div>

    <div class="app-cta-banner">
      <h3>Unlock the Full Experience</h3>
      <p>Portfolios, deep analysis, charting, and community features are only available in the Corpr app. Everything is synced automatically with this account.</p>
      <a href="#" class="btn-primary" style="display: inline-block;" onclick="return false;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
        Launching Soon
      </a>
    </div>
  </div>

  <script type="module" src="firebase-config.js"></script>
  <script type="module" src="profile.js"></script>
</body>
</html>
